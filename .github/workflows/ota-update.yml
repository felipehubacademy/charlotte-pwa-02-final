# .github/workflows/ota-update.yml
# Publica OTA automaticamente a cada push na branch main.
# Roda no mesmo ambiente Expo/Node que o EAS build, garantindo
# compatibilidade do bytecode Hermes com o binario nativo.

name: OTA Update (production)

on:
  push:
    branches: [main]
    paths:
      - 'charlotte-rn/**'

jobs:
  update:
    name: Publish EAS OTA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charlotte-rn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: charlotte-rn/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA (iOS)
        run: |
          eas update \
            --branch production \
            --platform ios \
            --message "OTA: ${{ github.event.head_commit.message }}" \
            --non-interactive
