# .github/workflows/ota-update.yml
# Publica OTA automaticamente a cada push na branch main.
# IMPORTANTE: deve rodar em macos-latest para que o hermesc (compilador
# Hermes) produza bytecode compativel com o binario iOS gerado pelo EAS.
# Linux hermesc gera formato diferente e causa crash no app.

name: OTA Update (production)

on:
  push:
    branches: [main]
    paths:
      - 'charlotte-rn/**'

jobs:
  update:
    name: Publish EAS OTA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: charlotte-rn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: charlotte-rn/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA (iOS)
        env:
          EXPO_PUBLIC_API_BASE_URL: https://charlotte-pwa-02-final.vercel.app
          EXPO_PUBLIC_SUPABASE_URL: https://fnvjibzreepubageztoi.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZudmppYnpyZWVwdWJhZ2V6dG9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzNTYyNTgsImV4cCI6MjA2MzkzMjI1OH0.lm1h39VOgl-VwxnpGEFkvFrNRGIEeA1sQFI7xTJTsnw
        run: |
          eas update \
            --branch production \
            --platform ios \
            --message "OTA: ${{ github.event.head_commit.message }}" \
            --non-interactive
