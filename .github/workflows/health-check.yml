name: Health Check

on:
  schedule:
    # Every hour at :30 (offset from notifications at :00)
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check API health
        run: |
          echo "Running health check at $(date -u)"

          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://charlotte.hubacademybr.com/api/health")

          body=$(echo "$response" | head -n -1)
          status_code=$(echo "$response" | tail -n 1)

          echo "HTTP status: $status_code"
          echo "Response body:"
          echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"

          # Extract service times for readable output
          assistant_ms=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); c=[x for x in d.get('checks',[]) if x['name']=='assistant']; print(c[0]['ms'] if c else 'N/A')" 2>/dev/null)
          tts_ms=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); c=[x for x in d.get('checks',[]) if x['name']=='tts']; print(c[0]['ms'] if c else 'N/A')" 2>/dev/null)
          overall=$(echo "$body" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)

          echo ""
          echo "Overall status : $overall"
          echo "Assistant      : ${assistant_ms}ms"
          echo "TTS            : ${tts_ms}ms"

          # Fail the step if API returned error status
          # GitHub will email the repo owner on workflow failure automatically
          if [ "$status_code" != "200" ]; then
            echo ""
            echo "ALERT: Health check failed (HTTP $status_code)"
            echo "Charlotte API is degraded or timing out — consider upgrading to Vercel Pro"
            exit 1
          fi

          if [ "$overall" = "degraded" ]; then
            echo ""
            echo "WARNING: Services are slow (>20s) — monitor closely"
            # Don't fail on warn — just log. Change exit 1 to alert sooner if needed.
          fi
