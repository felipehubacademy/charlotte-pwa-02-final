name: Push Notifications Scheduler

on:
  schedule:
    # 14h UTC = 11h BRT — daily reminder (quem nao praticou ainda)
    - cron: '0 14 * * *'
    # 21h UTC = 18h BRT — elogio (quem praticou) + streak em risco
    - cron: '0 21 * * *'
  workflow_dispatch: # permite rodar manualmente para testes

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call notification scheduler
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: github-actions-cron" \
            "https://charlotte.hubacademybr.com/api/notifications/scheduler")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "Scheduler call failed with status $response"
            exit 1
          fi
